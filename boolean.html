<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Boolean</h1>
<h2>Guess the Number</h2>
<p id="demo"></p>

<script>

let choice;
let text = "";

do {
  choice = prompt("Enter your choice:\n1 add\n2 subtract\n3 exit");

  if (choice !== "1" && choice !== "2" && choice !== "3") {
    text = "❌ Enter a valid option (1, 2, or 3)";
    
  } else if (choice === "1") {
    let a = Number(prompt("Enter first number:"));
    let b = Number(prompt("Enter second number:"));

    if (isNaN(a) || isNaN(b)) {
      text = "❌ Invalid numbers entered!";
    } else {
      text = "✅ The sum is: " + (a + b);
    }

  } else if (choice === "2") {
    let a = Number(prompt("Enter first number:"));
    let b = Number(prompt("Enter second number:"));

    if (isNaN(a) || isNaN(b)) {
      text = "❌ Invalid numbers entered!";
    } else {
      text = "✅ The difference is: " + (a - b);
    }

  } else if (choice === "3") {
    text = "👋 You chose to exit";
  }

  document.getElementById("demo").innerHTML = text;

} while (choice !== "3");

</script>

 
​</body>
</html>
