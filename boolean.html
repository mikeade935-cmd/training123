<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Boolean</h1>
<h2>Guess the Number</h2>
<p id="demo"></p>

<script>
   
   let text = "";

//sum = 5;


 let input = Number(prompt("Enter the factorial number: "));
    if(isNaN(input)  || input < 0){
      text = " Please enter a valid positive number.";
      
    }else{
      let i = 1;
    let factorial = 1;
  do{
    
    
    factorial *= i;
    i++;
 
  
 } while ( i <= input);
 text += "The factorial of " + input + " is " + factorial + "<br>";
}
document.getElementById("demo").innerHTML = text ;

</script>
 
​</body>
</html>
