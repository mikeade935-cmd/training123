<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Boolean</h1>
<h2>Guess the Number</h2>
<p id="demo"></p>

<script>
   let correctNum = 7;
   attempt = 0;
   let guessNum;
   
   let text = "";
   do{
     let input = parseInt(prompt("Guess a number between 1 and 10"));
     guessNum = Number(input);
    attempt++;
    if (isNaN(guessNum)){
        text = "Enter valid number ";
        continue;

    }else

    if(guessNum === correctNum){
        text = "Congratulations! You guessed the number." + " It took you " + attempt + " attempts.";
        document.getElementById("demo").innerHTML = text ;
        break;
    }
    else{
        text = "Wrong guess. Try again!" + " Attempt: " + attempt ;
        
    }
    document.getElementById("demo").innerHTML = text ;
   }


   

while(guessNum !== correctNum);
</script>
 
​</body>
</html>
