<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Boolean</h1>
<h2>Guess the Number</h2>
<p id="demo"></p>

<script>
   let text = " ";

   do {
 let input = prompt("Guess a number between 1 and 10: "); 
let randomNumber = Math.floor(Math.random() * 10) + 1;
if (input == randomNumber) {
  text = "Congratulations! You guessed the number.";
} else {
  text = "Sorry, the correct number was " + randomNumber + ". Try again!";
}


   }while(!true);
document.getElementById("demo").innerHTML = text ;

</script>
 
​</body>
</html>
