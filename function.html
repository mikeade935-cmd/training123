<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Functions</h1>
<p>You can call functions from events.</p>

<p id="demo"></p>
<script>
function add(factorial) {
  let sum = 1;
for(let i = 1; i <= factorial; i++) {
    sum *= i;
  }
  return sum;
}

  


let x = Number(prompt("Enter first number:"));
//let y = Number(prompt("Enter second number:"));
let z = add(x);
//text = sayHello(text);

document.getElementById("demo").innerHTML = "The factorial of " + x + " is: " + z;
</script>
</body>
</html>
